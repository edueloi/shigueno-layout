# ── Nginx — Página Shigueno ───────────────────────────────────────────────────
# Copiar para: /etc/nginx/sites-available/pagina-shigueno
# Ativar:      ln -s /etc/nginx/sites-available/pagina-shigueno /etc/nginx/sites-enabled/
# Testar:      nginx -t
# Recarregar:  systemctl reload nginx

server {
    listen 80;
    server_name pagina-teste.develoi.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name pagina-teste.develoi.com.br;

    # SSL (preenchido pelo certbot)
    # ssl_certificate /etc/letsencrypt/live/pagina-teste.develoi.com.br/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/pagina-teste.develoi.com.br/privkey.pem;

    # Uploads (fotos, documentos)
    client_max_body_size 20M;

    # Imagens estáticas servidas diretamente
    location /images/ {
        alias /var/www/pagina-shigueno/images/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /uploads/ {
        alias /var/www/pagina-shigueno/uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Tudo mais vai para o Node (porta 3008)
    location / {
        proxy_pass         http://127.0.0.1:3008;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }
}
